<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>عروسی ملیکا و احمدرضا</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Great+Vibes&family=Vazirmatn:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --green:#2f4a2c;
    --green-deep:#1f331d;
    --green-dark:#16261455;
    --gold:#c3a24e;
    --gold-soft:#d8bd78;
    --cream:#f6efe0;
    --cream-lit:#fbf6ea;
    --ink:#2c3a26;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    font-family:'Vazirmatn',sans-serif;
    background:
      radial-gradient(120% 90% at 50% -10%, #3a5836 0%, #294126 42%, #1c3019 78%, #142411 100%);
    color:var(--cream);
    min-height:100dvh;
    overflow-x:hidden;
  }
  /* faint damask texture + vignette over the green */
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background:
      radial-gradient(60% 60% at 50% 45%, transparent 55%, rgba(8,16,7,.55) 100%),
      repeating-linear-gradient(45deg, rgba(255,255,255,.012) 0 2px, transparent 2px 22px);
  }

  /* ---------- ambient gold sparkles ---------- */
  .sparkles{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden}
  .sparkles i{
    position:absolute;color:var(--gold-soft);font-size:14px;opacity:0;
    animation:twinkle 6s ease-in-out infinite;
    text-shadow:0 0 8px rgba(216,189,120,.6);
  }
  @keyframes twinkle{
    0%,100%{opacity:0;transform:translateY(6px) scale(.6)}
    50%{opacity:.85;transform:translateY(-6px) scale(1)}
  }

  /* ==========================================================
     SCREEN A — the envelope
     ========================================================== */
  .stage{
    position:relative;z-index:2;
    min-height:100dvh;display:grid;place-items:center;
    perspective:1400px;padding:24px;
    transition:opacity .7s ease, transform .9s ease;
  }
  body.revealed .stage{opacity:0;transform:scale(.94);pointer-events:none}

  .scene{
    position:relative;width:min(86vw,360px);height:min(86vw,360px);max-height:60vh;
    display:grid;place-items:center;
  }

  .envelope{
    position:relative;width:min(84vw,340px);height:min(56vw,226px);
    transform-style:preserve-3d;
    filter:drop-shadow(0 26px 40px rgba(6,14,5,.55));
    animation:breathe 5.5s ease-in-out infinite;
    cursor:pointer;
  }
  body.opening .envelope,body.revealed .envelope{animation:none;cursor:default}
  @keyframes breathe{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}

  /* envelope body (the pocket back) */
  .env-body{
    position:absolute;inset:0;border-radius:8px;
    background:linear-gradient(160deg,#f7f1e4,#e9dfc9);
    box-shadow:inset 0 0 0 1px rgba(140,116,60,.35);
  }
  /* the front pocket (lower V) that hides the card's bottom */
  .env-pocket{
    position:absolute;inset:0;border-radius:8px;z-index:3;
    background:
      linear-gradient(160deg,#f4ecdb,#e4d8bd);
    clip-path:polygon(0 34%,50% 100%,100% 34%,100% 100%,0 100%);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.5);
  }
  .env-pocket::after{ /* gold seam lines of the pocket */
    content:"";position:absolute;inset:0;
    background:
      linear-gradient(to top right, transparent calc(50% - .6px), rgba(160,132,66,.5) 50%, transparent calc(50% + .6px)),
      linear-gradient(to top left,  transparent calc(50% - .6px), rgba(160,132,66,.5) 50%, transparent calc(50% + .6px));
  }
  /* left/right inner side folds for depth */
  .env-side{position:absolute;top:0;bottom:0;width:52%;z-index:2;}
  .env-side.l{left:0;background:linear-gradient(90deg,#efe6d1,#e7dcc4);clip-path:polygon(0 0,100% 50%,0 100%)}
  .env-side.r{right:0;background:linear-gradient(270deg,#efe6d1,#e7dcc4);clip-path:polygon(100% 0,0 50%,100% 100%)}

  /* top flap */
  .env-flap{
    position:absolute;left:0;right:0;top:0;height:66%;z-index:6;
    transform-origin:top center;transform:rotateX(0deg);
    background:linear-gradient(160deg,#f7f1e4,#e8ddc5);
    clip-path:polygon(0 0,100% 0,50% 100%);
    box-shadow:0 2px 6px rgba(90,70,30,.18);
    transition:transform .9s cubic-bezier(.6,.04,.2,1), z-index 0s linear .45s;
  }
  .env-flap::after{content:"";position:absolute;inset:0;
    background:linear-gradient(to bottom, rgba(160,132,66,.0), rgba(160,132,66,.28));
    clip-path:polygon(0 0,100% 0,50% 100%)}
  body.opening .env-flap,body.revealed .env-flap{transform:rotateX(178deg);z-index:1}

  /* wax seal */
  .seal{
    position:absolute;top:52%;left:50%;transform:translate(-50%,-50%);
    z-index:8;width:70px;height:70px;border-radius:50%;
    display:grid;place-items:center;
    background:radial-gradient(circle at 35% 30%, #3c5c37, #24391f 70%);
    box-shadow:0 6px 14px rgba(10,20,8,.5), inset 0 0 0 2px rgba(200,170,90,.55), inset 0 0 18px rgba(0,0,0,.4);
    color:var(--gold-soft);font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;
    letter-spacing:1px;transition:transform .5s ease, opacity .5s ease;
  }
  .seal .amp{font-size:14px;opacity:.85;margin:0 1px;vertical-align:middle}
  body.opening .seal,body.revealed .seal{opacity:0;transform:translate(-50%,-50%) scale(.2) rotate(40deg)}

  /* the invitation card that rises out (screen A flourish) */
  .rising{
    position:absolute;left:50%;top:50%;z-index:4;
    width:min(66vw,238px);aspect-ratio:1058/1486;border-radius:6px;overflow:hidden;
    transform:translate(-50%,-6%) scale(.9);opacity:0;
    background:var(--cream);
    box-shadow:0 20px 40px rgba(8,16,6,.5);
    transition:transform 1s cubic-bezier(.5,.02,.2,1) .45s, opacity .5s ease .45s;
    pointer-events:none;
  }
  .rising img{width:100%;height:100%;display:block;object-fit:cover}
  body.opening .rising{transform:translate(-50%,-118%) scale(1.02);opacity:1}
  body.revealed .rising{opacity:0;transition:opacity .4s ease}

  .hint{
    position:absolute;left:0;right:0;bottom:-64px;text-align:center;
    font-size:14px;color:#e7dcc0;letter-spacing:.3px;font-weight:300;
  }
  .hint .tap{
    display:inline-block;margin-top:10px;width:26px;height:26px;border-radius:50%;
    border:1.5px solid var(--gold-soft);position:relative;
    animation:pulse 2s ease-in-out infinite;
  }
  .hint .tap::after{content:"";position:absolute;inset:8px;border-radius:50%;background:var(--gold-soft)}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(216,189,120,.5)}50%{box-shadow:0 0 0 10px rgba(216,189,120,0)}}
  body.opening .hint,body.revealed .hint{opacity:0;transition:opacity .4s}

  /* ==========================================================
     SCREEN B — the full invitation
     ========================================================== */
  .invitation-view{
    position:fixed;inset:0;z-index:3;overflow:hidden;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:14px;padding:14px 14px calc(14px + env(safe-area-inset-bottom));
    opacity:0;transform:scale(.97);pointer-events:none;
    transition:opacity .9s ease .35s, transform 1s ease .35s;
  }
  body.revealed .invitation-view{opacity:1;transform:none;pointer-events:auto}
  body:not(.revealed) .invitation-view{display:none}

  .card-wrap{
    position:relative;padding:8px;border-radius:12px;flex:0 1 auto;min-height:0;
    display:flex;
    background:linear-gradient(160deg, rgba(246,239,224,.14), rgba(246,239,224,.04));
    box-shadow:0 30px 60px rgba(6,14,5,.6), inset 0 0 0 1px rgba(195,162,78,.35);
  }
  .card-wrap::before{ /* gold inner hairline */
    content:"";position:absolute;inset:4px;border:1px solid rgba(195,162,78,.5);border-radius:8px;pointer-events:none;z-index:1
  }
  .card-wrap img{
    display:block;width:auto;height:auto;
    max-width:min(94vw,460px);max-height:min(76dvh,660px);border-radius:5px;
    box-shadow:0 8px 22px rgba(0,0,0,.28);
  }

  .countdown{display:flex;gap:8px;flex-shrink:0}
  .cd-unit{min-width:52px;text-align:center;padding:7px 5px;border-radius:9px;
    background:rgba(246,239,224,.06);box-shadow:inset 0 0 0 1px rgba(195,162,78,.3)}
  .cd-num{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;color:var(--cream-lit);line-height:1}
  .cd-lbl{font-size:10px;color:#d9cca8;margin-top:4px;font-weight:300}
  .cd-done{font-family:'Great Vibes',cursive;font-size:30px;color:var(--gold-soft)}

  .actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;flex-shrink:0}
  .btn{
    display:inline-flex;align-items:center;gap:7px;text-decoration:none;
    font-family:'Vazirmatn';font-size:13px;font-weight:400;color:var(--green-deep);
    background:linear-gradient(160deg,var(--gold-soft),var(--gold));
    padding:9px 16px;border-radius:999px;border:none;cursor:pointer;
    box-shadow:0 8px 18px rgba(10,20,8,.4);transition:transform .2s ease, filter .2s ease}
  .btn.ghost{background:transparent;color:var(--cream);box-shadow:inset 0 0 0 1px rgba(195,162,78,.55)}
  .btn:hover{transform:translateY(-2px);filter:brightness(1.04)}
  .btn svg{width:16px;height:16px}

  .footer{font-family:'Great Vibes',cursive;font-size:20px;color:var(--gold-soft);
    text-align:center;letter-spacing:.5px;flex-shrink:0;line-height:1.1}
  .footer small{display:block;font-family:'Vazirmatn';font-size:11px;font-weight:300;
    color:#cdbf9d;margin-top:2px;letter-spacing:.5px}

  .reopen{position:absolute;top:calc(12px + env(safe-area-inset-top));left:14px;z-index:4;
    width:38px;height:38px;border-radius:50%;background:rgba(20,36,17,.55);
    border:1px solid rgba(195,162,78,.5);color:#e7dcc0;font-size:16px;cursor:pointer;
    display:grid;place-items:center;backdrop-filter:blur(4px);transition:background .2s}
  .reopen:hover{background:rgba(20,36,17,.85)}

  @media (max-width:380px){
    .cd-unit{min-width:46px;padding:6px 4px}.cd-num{font-size:21px}
    .card-wrap img{max-height:72dvh}
  }
  @media (max-height:680px){
    .card-wrap img{max-height:64dvh}
    .footer{font-size:17px}
  }
  @media (prefers-reduced-motion:reduce){
    .envelope{animation:none}
    .env-flap,.rising,.stage,.invitation-view{transition-duration:.01s}
    .sparkles i{animation:none;opacity:.4}
  }
</style>
</head>

<script>
(function(){
  var body = document.body;
  var env  = document.getElementById('envelope');
  var view = document.getElementById('view');
  var reduce = window.matchMedia('(prefers-reduced-motion:reduce)').matches;

  /* --- sparkles --- */
  (function(){
    var s = document.getElementById('sparkles'), n = 22;
    for(var i=0;i<n;i++){
      var el=document.createElement('i');
      el.textContent='✦';
      el.style.left=(Math.random()*100)+'%';
      el.style.top=(Math.random()*100)+'%';
      el.style.fontSize=(8+Math.random()*12)+'px';
      el.style.animationDelay=(Math.random()*6)+'s';
      el.style.animationDuration=(4+Math.random()*5)+'s';
      s.appendChild(el);
    }
  })();

  var opened=false;
  function open(){
    if(opened) return; opened=true;
    body.classList.add('opening');
    view.setAttribute('aria-hidden','false');
    var d = reduce?60:1450;
    setTimeout(function(){ body.classList.add('revealed'); window.scrollTo(0,0); }, d);
  }
  function close(){
    opened=false;
    body.classList.remove('revealed');
    view.setAttribute('aria-hidden','true');
    setTimeout(function(){ body.classList.remove('opening'); }, reduce?60:600);
  }
  env.addEventListener('click', open);
  env.addEventListener('keydown', function(e){ if(e.key==='Enter'||e.key===' '){e.preventDefault();open();} });

  /* --- countdown to Tue, July 14 2026, 18:30 (+03:00) --- */

  var faDigits = function(x){ return String(x).replace(/\d/g,function(d){return '۰۱۲۳۴۵۶۷۸۹'[d];}); };
  var cd = document.getElementById('countdown');
  var units=[['روز',86400000],['ساعت',3600000],['دقیقه',60000],['ثانیه',1000]];
  function tick(){
    var diff = target - Date.now();
    if(diff<=0){ cd.innerHTML='<span class="cd-done">امشب، در انتظار شماییم</span>'; clearInterval(timer); return; }
    var html='';
    units.forEach(function(u){
      var v=Math.floor(diff/u[1]); diff-=v*u[1];
      html+='<div class="cd-unit"><div class="cd-num">'+faDigits(v)+'</div><div class="cd-lbl">'+u[0]+'</div></div>';
    });
    cd.innerHTML=html;
  }
